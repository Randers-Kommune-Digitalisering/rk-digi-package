name: Test and Coverage

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    tags:
      - '*'

jobs:
  test-and-cov:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install .
          pip install ".[test]"
          pip install flake8

      - name: Lint and Test with Coverage
        run: |
          flake8 src tests
          pytest --cov=src --cov-report=term --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}   # <-- uses your org secret
          files: coverage.xml
          slug: Randers-Kommune-Digitalisering/rk-digi-package
          fail_ci_if_error: true
