name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure tag is on main branch
        run: |
          if [ "$GITHUB_REF" != "refs/tags/$(git describe --tags --exact-match)" ] || { [ "$GITHUB_BASE_REF" != "main" ] && [ "$GITHUB_REF" != "refs/heads/main" ]; }; then
            echo "::error::Tag is not on main branch."
            exit 1
          fi
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check version matches tag
        run: |
          PKG_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*=\s*"\([0-9.]*\)"/\1/')
          TAG_VERSION=${GITHUB_REF##*/}
          TAG_VERSION=${TAG_VERSION#v}
          echo "Version in pyproject.toml: $PKG_VERSION"
          echo "Version from tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version in pyproject.toml ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run flake8 and pytest with coverage
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov
          flake8 src
          pytest --cov=src --cov-report=term --cov-fail-under=100
      - name: Install build tools
        run: |
          pip install build twine
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        run: twine upload --non-interactive -u __token__ -p "${{ secrets.PYPI_API_TOKEN }}" dist/*
