name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag is on main branch
        run: |
          TAG_COMMIT="$GITHUB_SHA"
          MAIN_COMMIT="$(git rev-parse origin/main)"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" "$MAIN_COMMIT"; then
            echo "::error::Tag is not on main branch."
            exit 1
          fi
      - name: Check version matches tag
        run: |
          PKG_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*=\s*"\([0-9.]*\)"/\1/')
          TAG_VERSION=${GITHUB_REF##*/}
          TAG_VERSION=${TAG_VERSION#v}
          echo "Version in pyproject.toml: $PKG_VERSION"
          echo "Version from tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version in pyproject.toml ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run flake8 and pytest with coverage
        run: |
          pip install .
          pip install ".[test]"
          pip install flake8
          flake8 src tests
          pytest --cov=src --cov-report=term --cov-fail-under=85
      - name: Install build tools
        run: |
          pip install build twine
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        run: twine upload --non-interactive -u __token__ -p "${{ secrets.PYPI_API_TOKEN }}" dist/*
